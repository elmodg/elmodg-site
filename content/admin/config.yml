backend:
  name: git-gateway
  branch: main

media_folder: "content/media/uploads"
public_folder: "/content/media/uploads"

collections:
  - name: "site"
    label: "Site"
    files:
      - name: "settings"
        label: "Conteúdo do Site"
        file: "content/site.json"
        format: "json"
        fields:
          - label: "SEO"
            name: "seo"
            widget: "object"
            fields:
              - {label: "Título", name: "title", widget: "string"}

          - label: "Marca"
            name: "brand"
            widget: "object"
            fields:
              - {label: "Nome", name: "name", widget: "string"}
              - label: "Logo"
                name: "logo"
                widget: "object"
                fields:
                  - {label: "Arquivo", name: "src", widget: "image", required: false}
                  - {label: "Alt", name: "alt", widget: "string", required: false}

          - label: "Hero"
            name: "hero"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Subtítulo", name: "subtitle", widget: "text"}
              - {label: "CTA (label)", name: "ctaLabel", widget: "string"}
              - {label: "Chip 1", name: "chip1", widget: "string"}
              - {label: "Chip 2", name: "chip2", widget: "string"}
              - label: "Vídeo"
                name: "video"
                widget: "object"
                fields:
                  - {label: "MP4", name: "mp4", widget: "file", required: false}
                  - {label: "Poster", name: "poster", widget: "image", required: false}

          - label: "Posicionamento"
            name: "positioning"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Texto", name: "body", widget: "text"}
              - {label: "Rodapé", name: "footer", widget: "text"}

          - label: "Capacidades"
            name: "capabilities"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - label: "Itens"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Tag", name: "tag", widget: "string"}
                  - {label: "Título", name: "title", widget: "string"}
                  - {label: "Texto", name: "text", widget: "text"}

          - label: "Método"
            name: "method"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - label: "Etapas"
                name: "steps"
                widget: "list"
                fields:
                  - {label: "Título", name: "title", widget: "string"}
                  - {label: "Texto", name: "text", widget: "text"}

          - label: "Prova Social"
            name: "proof"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - label: "Itens"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Frase", name: "quote", widget: "string"}
                  - {label: "Meta (esq)", name: "metaLeft", widget: "string"}
                  - {label: "Meta (dir)", name: "metaRight", widget: "string"}
                  - {label: "Antes", name: "before", widget: "string"}
                  - {label: "Depois", name: "after", widget: "string"}

          - label: "Para quem é"
            name: "fit"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - label: "Itens"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Título", name: "title", widget: "string"}
                  - {label: "Texto", name: "text", widget: "text"}
                  - {label: "Destaque", name: "highlight", widget: "boolean", required: false}

          - label: "Portfólio (Reels/Vídeos)"
            name: "portfolio"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Intro", name: "intro", widget: "text"}
              - label: "Itens"
                name: "items"
                widget: "list"
                fields:
                  - {label: "Tipo", name: "type", widget: "select", options: ["mp4", "embed"], default: "mp4"}
                  - {label: "Título", name: "title", widget: "string"}
                  - {label: "URL MP4", name: "url", widget: "string", required: false}
                  - {label: "Embed URL", name: "embedUrl", widget: "string", required: false}
                  - {label: "Thumb", name: "thumb", widget: "image", required: false}

          - label: "CTA Final"
            name: "finalCta"
            widget: "object"
            fields:
              - {label: "Kicker", name: "kicker", widget: "string"}
              - {label: "Título", name: "title", widget: "string"}
              - {label: "Texto", name: "text", widget: "text"}
              - {label: "Botão", name: "button", widget: "string"}
              - {label: "Nota", name: "note", widget: "string"}

          - label: "Footer"
            name: "footer"
            widget: "object"
            fields:
              - {label: "Marca", name: "brand", widget: "string"}
              - {label: "Slogan", name: "slogan", widget: "string"}
              - {label: "Descrição", name: "desc", widget: "text"}
              - {label: "Local", name: "location", widget: "string"}
              - {label: "Instagram URL", name: "instagramUrl", widget: "string"}
              - {label: "Copyright", name: "copyright", widget: "string"}
