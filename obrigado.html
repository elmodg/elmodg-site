<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obrigado | Elmo DG</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="config.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            black: '#0a0a0a',
                            gray: '#1a1a1a',
                            lime: '#a3e635',
                            muted: '#a1a1aa',
                            whatsapp: '#25D366'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-brand-black text-white min-h-screen flex items-center justify-center">
    <div class="text-center max-w-2xl px-4">
        <div class="w-20 h-20 rounded-full bg-brand-lime/20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-10 h-10 text-brand-lime" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-4xl md:text-5xl font-bold mb-4">Diagnóstico <span class="text-brand-lime">Solicitado!</span></h1>
        <p class="text-xl text-brand-muted mb-8">Recebemos seus dados. Nossa equipe vai analisar sua presença digital e entrar em contato em até <span class="text-white font-semibold">24 horas úteis</span>.</p>
        
        <div class="bg-brand-gray rounded-2xl p-6 mb-8 border border-white/10">
            <p class="text-brand-muted mb-4">Quer agilizar? Fale direto no WhatsApp:</p>
            <a href="#" id="whatsappObrigado" target="_blank" class="inline-flex items-center gap-3 bg-brand-whatsapp text-white font-bold py-4 px-8 rounded-full hover:bg-green-600 transition-all duration-300 hover:scale-105">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                Falar no WhatsApp Agora
            </a>
        </div>
        
        <a href="/" class="text-brand-muted hover:text-brand-lime transition-colors">← Voltar para o site</a>
    </div>

    <script>
        // Configurar WhatsApp
        const config = window.ELMO_CONFIG || {};
        const numero = config.whatsapp?.numero || '5521992166374';
        const mensagem = encodeURIComponent('Olá!, Preenchi o formulário de diagnóstico e gostaria de agilizar o atendimento.');
        document.getElementById('whatsappObrigado').href = `https://wa.me/${numero}?text=${mensagem}`;
    </script>
</body>
</html>
